<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIJAYA ACCU - BIG & SPACED</title>
    <style>
        :root { --bg: #f0f2f5; --aksen: #2d3436; }
        body { font-family: sans-serif; background: var(--bg); padding: 15px; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 15px; max-width: 450px; margin: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 4px solid var(--aksen); padding-bottom: 10px; margin-bottom: 20px; }
        label { display: block; margin-top: 12px; font-weight: bold; font-size: 14px; color: #333; }
        select, input { width: 100%; padding: 14px; margin-top: 5px; border: 2px solid #ccc; border-radius: 10px; box-sizing: border-box; font-size: 16px; outline: none; }
        .item-tambah { background: #f1f2f6; padding: 10px; border-radius: 10px; margin-top: 10px; border-left: 5px solid #0984e3; }
        .total-box { background: #eee; padding: 15px; border-radius: 10px; margin-top: 20px; text-align: center; border: 2px solid #2d3436; }
        .total-val { font-size: 30px; font-weight: 900; }
        button { width: 100%; padding: 16px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-next { background: #0984e3; color: white; }
        .btn-print { background: #2d3436; color: white; margin-top: 20px; height: 60px; font-size: 18px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1 style="margin:0">TRIJAYA ACCU</h1>
        <div style="font-size:11px; font-weight: bold;">KASIR DIGITAL</div>
    </div>

    <label>PILIH MERK AKI</label>
    <select id="merk" onchange="hitungTotal()">
        <option value="">-- TANPA AKI --</option>
        <option value="GS">GS</option>
        <option value="AMARON">AMARON</option>
        <option value="YUASA">YUASA</option>
        <option value="INCOE">INCOE</option>
        <option value="SOLITE">SOLITE</option>
        <option value="FB">FB</option>
        <option value="JAP">JAP</option>
        <option value="MOTOBATT">MOTOBATT</option>
        <option value="FASTER">FASTER</option>
        <option value="QS">QS</option>
        <option value="ITOBATT">ITOBATT</option>
        <option value="MSB">MSB</option>
        <option value="KRP">KRP</option>
        <option value="MASSIV">MASSIV</option>
        <option value="NAGOYA">NAGOYA</option>
        <option value="SOLANA">SOLANA</option>
        <option value="JB">JB</option>
        <option value="KAYABA">KAYABA</option>
    </select>

    <label>TIPE AKI</label>
    <input list="tipe-list" id="tipe" placeholder="NS40, NS60, N70, dll...">
    <datalist id="tipe-list">
        <option value="GTZ5S"> <option value="YTZ5S"> <option value="NS40"> <option value="NS60"> <option value="N50"> <option value="N70">
    </datalist>

    <label>HARGA AKI (Rp)</label>
    <input type="number" id="harga_aki" placeholder="0" oninput="hitungTotal()">

    <label>POTONGAN TT (Rp)</label>
    <input type="number" id="pot" value="0" oninput="hitungTotal()">

    <div id="container-tambahan"></div>
    <button class="btn-next" onclick="tambahInput()">+ NEXT (TAMBAH BARANG LAIN)</button>

    <div class="total-box">
        <div class="total-val" id="totalDisplay">Rp 0</div>
    </div>

    <button class="btn-print" onclick="shareNota()">CETAK NOTA GEDE</button>
</div>

<script>
    let jumlahTambahan = 0;

    function tambahInput() {
        jumlahTambahan++;
        const div = document.createElement('div');
        div.className = 'item-tambah';
        div.innerHTML = `
            <label>NAMA BARANG / JASA</label>
            <input type="text" id="n_t_${jumlahTambahan}" placeholder="Contoh: Air Aki">
            <label>HARGA (Rp)</label>
            <input type="number" id="h_t_${jumlahTambahan}" placeholder="0" oninput="hitungTotal()">
        `;
        document.getElementById('container-tambahan').appendChild(div);
    }

    function hitungTotal() {
        let hAki = parseInt(document.getElementById('harga_aki').value) || 0;
        let pTT = parseInt(document.getElementById('pot').value) || 0;
        let total = hAki - pTT;
        for (let i = 1; i <= jumlahTambahan; i++) {
            total += (parseInt(document.getElementById(`h_t_${i}`).value) || 0);
        }
        document.getElementById('totalDisplay').innerText = "Rp " + total.toLocaleString('id-ID');
    }

    function perlebar(teks) {
        return teks.split('').join(' ').toUpperCase();
    }

    function r(l, v, w = 32) {
        let space = w - l.length - v.length;
        return l + " ".repeat(Math.max(1, space)) + v;
    }

    function c(t, w = 32) {
        let space = Math.floor((w - t.length) / 2);
        return " ".repeat(Math.max(0, space)) + t;
    }

    function shareNota() {
        const m = document.getElementById('merk').value;
        const tp = document.getElementById('tipe').value;
        const hAki = parseInt(document.getElementById('harga_aki').value) || 0;
        const pTT = parseInt(document.getElementById('pot').value) || 0;
        const tgl = new Date().toLocaleDateString('id-ID');

        let j1 = c(perlebar("TRIJAYA"));
        let j2 = c(perlebar("ACCU"));
        let garis = "================================";

        let nota = "\n" + j1 + "\n" + j2 + "\n" + 
                   c("TUKAR TAMBAH ACCU") + "\n" +
                   c("WA: 0821-4320-2129") + "\n" + garis + "\n";

        nota += r("TANGGAL", tgl) + "\n" + garis + "\n\n"; // Double Enter setelah garis tanggal

        // BAGIAN TENGAH (SETIAP BARIS DIKASIH ENTER)
        if (m !== "") {
            nota += r("MERK", m.toUpperCase()) + "\n\n";
            if (tp) nota += r("TIPE", tp.toUpperCase()) + "\n\n";
            if (hAki > 0) nota += r("HARGA", "RP " + hAki.toLocaleString('id-ID')) + "\n\n";
            if (pTT > 0) nota += r("POT. TT", "-RP " + pTT.toLocaleString('id-ID')) + "\n\n";
        }

        let totalFinal = hAki - pTT;
        for (let i = 1; i <= jumlahTambahan; i++) {
            let n = document.getElementById(`n_t_${i}`).value.toUpperCase();
            let h = parseInt(document.getElementById(`h_t_${i}`).value) || 0;
            if (n !== "" && h > 0) {
                nota += r(n.substring(0, 15), "RP " + h.toLocaleString('id-ID')) + "\n\n";
                totalFinal += h;
            }
        }

        nota += garis + "\n" + 
                r("TOTAL AKHIR", "RP " + totalFinal.toLocaleString('id-ID')) + "\n" + 
                garis + "\n\n";

        if (m !== "") {
            let gr = (m === "GS") ? "1 BULAN" : 
                     (m === "FB" || m === "SOLITE" || m === "JAP") ? "12 BULAN" : "3 BULAN";
            nota += c("GARANSI: " + gr) + "\n";
        }

        nota += "\n" + c("TERIMA KASIH") + "\n\n\n\n";

        if (navigator.share) {
            navigator.share({ title: 'Nota Trijaya', text: nota });
        } else {
            alert("Sistem Share Tidak Ada!");
        }
    }
</script>
</body>
</html>
